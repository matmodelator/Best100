<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Рифмы века — Top21</title>

<style>
* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: Georgia, "Times New Roman", serif;
  background: #f4efe7;
  color: #1f1f1f;
}

header {
  background: #1f2933;
  color: white;
  padding: 18px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 36px;
}

header p {
  margin: 6px 0 0;
  color: #d1d5db;
  font-size: 16px;
}

nav {
  background: #111827;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 14px;
  font-family: Arial, sans-serif;
}

.container {
  max-width: 1160px;
  width: 100%;
  margin: 0 auto;
  padding: 10px 18px;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.section-title {
  margin: 0 0 8px;
  font-size: 26px;
}

.controls {
  margin-bottom: 8px;
}

.controls input {
  width: 100%;
  padding: 8px;
  font-size: 14px;
  border: 1px solid #c7c7c7;
  border-radius: 8px;
}

.top-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
  flex: 1;
  min-height: 0;
}

.poem-card {
  background: white;
  padding: 6px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.poem-card h3 {
  margin: 0 0 3px;
  font-size: 13px;
  line-height: 1.1;
}

.author {
  font-size: 12px;
  color: #7c2d12;
  font-weight: bold;
  margin: 3px 0;
}

.excerpt {
  font-size: 11px;
  line-height: 1.15;
  white-space: pre-line;
  overflow: hidden;
}

.meta {
  margin-top: auto;
  font-size: 10px;
  color: #777;
}

footer {
  margin-top: 0;
  background: #1f2933;
  color: #d1d5db;
  text-align: center;
  padding: 12px;
  font-family: Arial, sans-serif;
}

.user-status-bar {
  background: #efe5d6;
  padding: 8px 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  font-family: Arial, sans-serif;
  font-size: 14px;
}

.status {
  padding: 4px 10px;
  border-radius: 999px;
  background: white;
  border: 1px solid #d6c7b2;
}

.status.active {
  background: #7c2d12;
  color: white;
  border-color: #7c2d12;
}

.author-status {
  margin-left: 18px;
  border-color: #7c2d12;
}
  
@media (max-width: 1024px) {
  .top-grid {
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(7, 1fr);
  }

  header h1 {
    font-size: 34px;
  }

  .poem-card {
    padding: 5px;
  }

  .poem-card h3 {
    font-size: 12px;
  }

  .author {
    font-size: 11px;
  }

  .excerpt {
    font-size: 10px;
  }

  .meta {
    font-size: 9px;
  }
}
</style>

</head>

<body>

<header>
  <h1>Рифмы века</h1>
  <p>21 стихотворение русскоязычной поэзии третьего тысячелетия</p>
</header>

<nav>
  <a href="#">Главная</a>
  <a href="#top21">Антология XXI</a>
  <a href="#">Авторы</a>
  <a href="#">О проекте</a>
</nav>

<div class="user-status-bar">
  <span class="status" data-status="Гость">Гость</span>

  <span>↓</span>
  <span class="status" data-status="Критик">Критик</span>
  <span>↓</span>
  <span class="status" data-status="Эксперт">Эксперт</span>

  <span class="status author-status" data-status="Автор">Автор</span>
</div>
  
<div class="container">

  <h2 class="section-title" id="top21">Антология 21</h2>

  <div class="controls">
    <input
      type="text"
      id="searchInput"
      placeholder="Поиск по названию или автору..."
      oninput="renderTop21()"

  <div class="top-grid" id="topGrid"></div>

</div>

<footer>
  Рифмы века © 2026
</footer>

function createCard(poem) {
  const card = document.createElement("div");
  card.className = "poem-card";

  card.innerHTML = `
    <h3>${poem.title}</h3>
    <div class="author">${poem.author}</div>
    <div class="excerpt">${poem.excerpt}</div>
    <div class="meta">${poem.year}</div>
  `;

  return card;
}

function renderTop21() {
  const topGrid = document.getElementById("topGrid");
  const search = document.getElementById("searchInput").value.toLowerCase();

  topGrid.innerHTML = "";

  poems
    .filter(poem =>
      poem.title.toLowerCase().includes(search) ||
      poem.author.toLowerCase().includes(search)
    )
    .forEach(poem => {
      topGrid.appendChild(createCard(poem));
    });
}

renderTop21();

<script>

const user = {
  votes: 0,
  reviews: 0,
  expertReviews: 0,
  isAuthor: false
};

function getUserStatus() {
  if (user.expertReviews >= 21) return "Эксперт";
  if (user.reviews >= 1) return "Критик";
  if (user.votes >= 1) return "Читатель";
  return "Гость";
}

function renderUserStatus() {
  const currentStatus = getUserStatus();

  document.querySelectorAll(".status").forEach(item => {
    item.classList.remove("active");

    if (item.dataset.status === currentStatus) {
      item.classList.add("active");
    }

    if (item.dataset.status === "Автор" && user.isAuthor) {
      item.classList.add("active");
    }
  });
}

renderUserStatus();

</script>

<div id="service-console">

<div class="row" id="build-down">
deploy: --
</div>

<script>
(function () {
  const now = new Date();

  const pad = n =>
    String(n).padStart(2, "0");

  const date =
      pad(now.getDate())
    + "."
    + pad(now.getMonth() + 1)
    + "."
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ":"
    + pad(now.getMinutes());

  document
    .getElementById("build-down")
    .textContent =
      "deploy: "
      + date
      + " "
      + time;
})();
</script>
