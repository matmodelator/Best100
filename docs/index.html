<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  background: #f4efe7;
  color: #1f1f1f;
}

header {
  background: #1f2933;
  color: white;
  padding: 26px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 42px;
}

header p {
  margin: 10px 0 0;
  color: #d1d5db;
  font-size: 18px;
}

nav {
  background: #111827;
  padding: 12px;
  text-align: center;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 14px;
  font-family: Arial, sans-serif;
}

.container {
  max-width: 1160px;
  margin: 30px auto;
  padding: 0 18px;
}

.section-title {
  margin-top: 40px;
  font-size: 30px;
}

.poem-card {
  background: white;
  padding: 6px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,.08);
  min-height: 0;
}

.poem-card h3 {
  margin: 0 0 3px;
  font-size: 13px;
  line-height: 1.1;
}

.author {
  font-size: 12px;
  color: #7c2d12;
  font-weight: bold;
  margin: 3px 0;
}

.excerpt {
  font-size: 11px;
  line-height: 1.15;
  white-space: pre-line;
}

.meta {
  margin-top: 4px;
  font-size: 10px;
  color: #777;
}

.top-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.controls {
  display: flex;
  gap: 12px;
  margin: 24px 0;
}

.poems-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
  
@media (max-width: 1024px) {
  .top-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .poem-card {
    padding: 5px;
  }

  .poem-card h3 {
    font-size: 12px;
  }

  .author {
    font-size: 11px;
  }

  .excerpt {
    font-size: 10px;
  }

  .meta {
    font-size: 9px;
  }

  header h1 {
    font-size: 34px;
  }
}
</style>

</head>

function createCard(poem) {
  const card = document.createElement("div");
  card.className = "poem-card";

  card.innerHTML = `
   
    <h3>${poem.title}</h3>
    <div class="author">${poem.author}</div>
    <div class="excerpt">${poem.excerpt}</div>
    <div class="meta">${poem.year}</div>
  `;

  return card;
}

function renderTop21() {
  const topGrid = document.getElementById("topGrid");

  topGrid.innerHTML = "";

  poems
    .slice(0, 21)
    .forEach(poem => {
      topGrid.appendChild(createCard(poem));
    });
}

function renderPoems() {
  const grid = document.getElementById("poemsGrid");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const author = document.getElementById("authorFilter").value;

  grid.innerHTML = "";

  const filtered = poems.filter(poem => {
    const matchesSearch =
      poem.title.toLowerCase().includes(search) ||
      poem.author.toLowerCase().includes(search);

    const matchesAuthor =
      author === "" || poem.author === author;

    return matchesSearch && matchesAuthor;
  });

  filtered.forEach(poem => {
    grid.appendChild(createCard(poem));
  });
}

function renderAuthorFilter() {
  const select = document.getElementById("authorFilter");

  const authors = [...new Set(poems.map(poem => poem.author))];

  authors.forEach(author => {
    const option = document.createElement("option");
    option.value = author;
    option.textContent = author;
    select.appendChild(option);
  });
}

function scrollToPoems() {
  document.getElementById("poems").scrollIntoView({
    behavior: "smooth"
  });
}

renderAuthorFilter();
renderTop21();

<script>
(function () {
  const now = new Date();

  const pad = n =>
    String(n).padStart(2, "0");

  const date =
      pad(now.getDate())
    + "."
    + pad(now.getMonth() + 1)
    + "."
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ":"
    + pad(now.getMinutes());

  document
    .getElementById("build-down")
    .textContent =
      "deploy: "
      + date
      + " "
      + time;
})();
